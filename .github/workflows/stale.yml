name: Stale Management

on:
  schedule:
    - cron: '0 0 * * *'  # Daily at midnight UTC
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark stale issues and PRs
    runs-on: ubuntu-latest

    steps:
      - uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-stale: 60
          days-before-close-stale: 14
          stale-issue-message: |
            This issue has been automatically marked as stale because it has not had
            recent activity. It will be closed if no further activity occurs.
            If this is still important to you, please comment and it will not be closed.
          stale-pr-message: |
            This PR has been automatically marked as stale due to inactivity.
            Please add a comment to keep it open, or it will be closed.
          close-issue-message: |
            This issue was closed because it has been inactive for 60 days.
            If you believe this is still relevant, please open a new issue.
          close-pr-message: |
            This PR was closed because it has been inactive for 14 days.
            Please open a new PR if the work is still relevant.
          exempt-issue-labels: "pinned,security"
          exempt-pr-labels: "pinned"
          only-labels: ""
          operations-per-run: 100
