name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'  # Weekly Mondays at 06:00 UTC
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pip-audit:
    name: pip-audit (Python deps)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install production dependencies
        run: pip install -r requirements.txt

      - name: Run pip-audit
        uses: pypa/pip-audit@v1.0
        with:
          vulnerability-service: osv
          fail-on: none

  bandit:
    name: Bandit (static analysis)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run Bandit
        run: bandit -r app/ -f json -o bandit-report.json || true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 14

  trivy-image:
    name: Trivy (Docker image scan)
    runs-on: ubuntu-latest
    needs: [pip-audit, bandit]
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker build \
            --target final \
            --tag local-whisper:scan \
            .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: local-whisper:scan
          format: json
          output: trivy-report.json
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: 0

      - name: Upload Trivy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-report
          path: trivy-report.json
          retention-days: 14

      - name: Fail on critical vulnerabilities
        run: |
          CRITICAL=$(grep -c '"Severity": "CRITICAL"' trivy-report.json || echo "0")
          if [ "$CRITICAL" -gt 0 ]; then
            echo "Found $CRITICAL CRITICAL vulnerabilities in Docker image"
            exit 1
          fi
