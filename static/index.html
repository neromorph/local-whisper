<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Whisper Transcription</title>
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css"
  />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body data-theme="auto">
  <main class="container">
    <header class="app-header">
      <h1>Whisper Transcription</h1>
      <p class="muted">Local-first audio & video transcription</p>
    </header>

    <!-- Input View -->
    <div id="input-area" class="view-container">
      <article class="mode-card">
        <div class="mode-switcher" id="mode-switcher">
          <button class="mode-tab active" data-mode="upload" id="mode-upload">Upload File</button>
          <button class="mode-tab" data-mode="url" id="mode-url">URL Mode</button>
        </div>
      </article>

      <!-- Upload Mode -->
      <article id="upload-zone">
        <input type="file" id="file-input" accept=".mp3,.wav,.m4a,.mp4,.mkv,.mov,.webm,.flac,.ogg,.aac,.wma,.aiff" hidden />
        <div class="upload-zone-inner">
          <svg class="upload-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
            <polyline points="17 8 12 3 7 8" />
            <line x1="12" y1="3" x2="12" y2="15" />
          </svg>
          <p><strong>Drag & drop</strong> audio or video here</p>
          <p class="muted">or click to browse</p>
          <p class="file-info" id="file-info">No file selected</p>
        </div>
      </article>

      <!-- URL Mode -->
      <article id="url-section" hidden>
        <label for="url-input">Video or Audio URL</label>
        <input
          type="url"
          id="url-input"
          placeholder="https://youtube.com/watch?v=..."
          autocomplete="off"
        />
        <p class="url-hint">Supports YouTube and other public media links</p>
        <div class="metadata-info" id="metadata-info" hidden>
          <div class="metadata-item">
            <span class="metadata-key">Title:</span>
            <span class="metadata-value" id="meta-title">—</span>
          </div>
          <div class="metadata-item">
            <span class="metadata-key">Duration:</span>
            <span class="metadata-value" id="meta-duration">—</span>
          </div>
          <div class="metadata-item">
            <span class="metadata-key">Uploader:</span>
            <span class="metadata-value" id="meta-uploader">—</span>
          </div>
        </div>
      </article>

      <article>
        <div class="grid">
          <label>
            Model
            <select id="model-select">
              <option value="tiny">tiny (fastest, least accurate)</option>
              <option value="base" selected>base (balanced)</option>
              <option value="small">small (better accuracy)</option>
              <option value="medium">medium (high accuracy)</option>
              <option value="turbo">turbo (fast, good accuracy)</option>
            </select>
          </label>
          <label>
            Language
            <select id="language-select">
              <option value="auto" selected>Auto-detect</option>
              <option value="en">English</option>
              <option value="id">Indonesian</option>
              <option value="es">Spanish</option>
              <option value="fr">French</option>
              <option value="de">German</option>
              <option value="it">Italian</option>
              <option value="pt">Portuguese</option>
              <option value="nl">Dutch</option>
              <option value="ja">Japanese</option>
              <option value="zh">Chinese</option>
              <option value="ko">Korean</option>
              <option value="ru">Russian</option>
              <option value="ar">Arabic</option>
              <option value="hi">Hindi</option>
            </select>
          </label>
          <label>
            Task
            <select id="task-select">
              <option value="transcribe" selected>Transcribe</option>
              <option value="translate">Translate to English</option>
            </select>
          </label>
        </div>
      </article>

      <article>
        <div class="button-group">
          <button id="start-btn" disabled>Start Transcription</button>
          <button id="reset-btn" class="secondary">Clear / Reset</button>
        </div>
        <p class="muted">Press <kbd>Ctrl</kbd>+<kbd>Enter</kbd> to start</p>
      </article>
    </div>

    <!-- Progress View -->
    <div id="progress-area" class="view-container" hidden>
      <article id="status-card">
        <div class="status-row">
          <span class="spinner" id="status-spinner"></span>
          <span id="status-text">Ready</span>
        </div>
        <div class="progress-wrapper" id="progress-wrapper" hidden>
          <progress id="progress-bar" value="0" max="100"></progress>
          <span id="progress-percent">0%</span>
        </div>
        <p class="error-text" id="error-text" hidden></p>
      </article>

      <article>
        <div class="button-group">
          <button id="cancel-btn" class="contrast" hidden>Cancel</button>
          <button id="start-over-btn" class="secondary" hidden>Start Over</button>
        </div>
      </article>
    </div>

    <!-- Result View -->
    <div id="result-area" class="view-container" hidden>
      <article id="result-card">
        <h2>Transcript</h2>
        <textarea id="transcript-area" readonly placeholder="Transcript will appear here..."></textarea>
        <div class="button-group">
          <button id="copy-btn" class="secondary">Copy</button>
          <button id="download-txt-btn" class="secondary">Download .txt</button>
          <button id="download-srt-btn" class="secondary">Download .srt</button>
        </div>
      </article>

      <article>
        <button id="new-transcription-btn" class="secondary">New Transcription</button>
      </article>
    </div>
  </main>

  <script src="/static/app.js"></script>
</body>
</html>
